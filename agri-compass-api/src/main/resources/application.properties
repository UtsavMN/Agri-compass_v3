# =============================================================================
# Agri Compass - Spring Boot API Configuration
# =============================================================================

# Server
server.port=${PORT:8080}
server.address=0.0.0.0
app.backend-url=${BACKEND_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# =============================================================================
# DATABASE (Default: SQLite for local dev. Use PostgreSQL for production!)
# =============================================================================
# To use PostgreSQL in production (Railway/Supabase), set these Environment Variables:
# 1. SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:<port>/<db>
# 2. SPRING_DATASOURCE_USERNAME=<user>
# 3. SPRING_DATASOURCE_PASSWORD=<password>
# 4. SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
# 5. SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/agri}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# Connection pool — prevents "too many connections" errors on Render
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true

# =============================================================================
# CLERK AUTHENTICATION (OAuth2 Resource Server)
# =============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URI:https://delicate-moth-5.clerk.accounts.dev}

# =============================================================================
# SMTP / EMAIL CONFIGURATION (Gmail)
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================================================
# FILE UPLOAD (Multipart)
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =============================================================================
# AWS S3 (for file storage - optional, can use local disk for development)
# =============================================================================
aws.s3.bucket-name=your-s3-bucket-name
aws.s3.region=ap-south-1
# Set AWS credentials via environment variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

# =============================================================================
# CORS (Allow your Vercel frontend)
# =============================================================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://agri-compass-v3.vercel.app}

# =============================================================================
# LOGGING
# =============================================================================
logging.level.com.agricompass=DEBUG
logging.level.org.springframework.security=DEBUG

# =============================================================================
# GEMINI AI SERVICE (Get from https://aistudio.google.com/)
# =============================================================================
gemini.api.keys=${GEMINI_API_KEY:}
gemini.api.key.primary=${GEMINI_API_KEY:}
gemini.api.key.secondary=${GEMINI_API_KEY_SECONDARY:}
gemini.api.model=gemini-1.5-flash

# =============================================================================
# DATA.GOV.IN (Get from https://www.data.gov.in/)
# =============================================================================
data.gov.in.api.key=${DATA_GOV_API_KEY:}

# =============================================================================
# OPENWEATHER (Get from https://openweathermap.org/api)
# =============================================================================
openweather.api.key=${OPENWEATHER_API_KEY:}

# =============================================================================
# JACKSON CONFIGURATION
# =============================================================================
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

