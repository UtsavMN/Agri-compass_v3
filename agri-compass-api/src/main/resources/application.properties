# =============================================================================
# Agri Compass - Spring Boot API Configuration
# =============================================================================

# Server
server.port=${PORT:8080}

# =============================================================================
# DATABASE (Turso / SQLite)
# To use Turso, use the libsql-jdbc driver. Replace AUTH_TOKEN with your token
# Get your token from Turso dashboard
# =============================================================================
spring.datasource.url=${DB_URL:jdbc:sqlite:agri.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================================================
# CLERK AUTHENTICATION (OAuth2 Resource Server)
# =============================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URI:https://delicate-moth-5.clerk.accounts.dev}

# =============================================================================
# SMTP / EMAIL CONFIGURATION (Gmail)
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================================================
# FILE UPLOAD (Multipart)
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =============================================================================
# AWS S3 (for file storage - optional, can use local disk for development)
# =============================================================================
aws.s3.bucket-name=your-s3-bucket-name
aws.s3.region=ap-south-1
# Set AWS credentials via environment variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

# =============================================================================
# CORS (Allow your Vercel frontend)
# =============================================================================
cors.allowed-origins=http://localhost:5173,https://your-app.vercel.app

# =============================================================================
# LOGGING
# =============================================================================
logging.level.com.agricompass=DEBUG
logging.level.org.springframework.security=DEBUG

# =============================================================================
# GEMINI AI SERVICE (Get from https://aistudio.google.com/)
# =============================================================================
gemini.api.keys=${GEMINI_API_KEY}

# =============================================================================
# DATA.GOV.IN (Get from https://www.data.gov.in/)
# =============================================================================
datagov.api.key=${DATA_GOV_API_KEY}

# =============================================================================
# OPENWEATHER (Get from https://openweathermap.org/api)
# =============================================================================
openweather.api.key=${OPENWEATHER_API_KEY}
